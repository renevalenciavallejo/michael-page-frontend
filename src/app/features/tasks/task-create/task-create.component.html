<section class="mx-auto max-w-xl">
  <header class="mb-4 flex items-center justify-between">
    <h1 class="text-xl font-semibold">Nueva tarea</h1>
    <a routerLink="/tasks" class="text-sm text-slate-600 hover:underline"
      >← Volver</a
    >
  </header>

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="flex flex-col gap-4 rounded-lg border border-slate-200 bg-white p-5 shadow-sm"
  >
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-slate-700" for="title"
        >Título *</label
      >
      <input
        id="title"
        type="text"
        formControlName="title"
        class="rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900"
      />
      @if (showError('title')) {
        <span class="text-xs text-red-600">El título es obligatorio.</span>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-slate-700" for="userId"
        >Usuario asignado *</label
      >
      <select
        id="userId"
        formControlName="userId"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900"
      >
        <option [ngValue]="null" disabled>Selecciona un usuario…</option>
        @for (u of users(); track u.id) {
          <option [ngValue]="u.id">{{ u.name }} — {{ u.email }}</option>
        }
      </select>
      @if (users().length === 0 && !usersResource.isLoading()) {
        <span class="text-xs text-slate-500">
          No hay usuarios.
          <a routerLink="/users/new" class="underline">Crea uno</a>.
        </span>
      }
      @if (showError('userId')) {
        <span class="text-xs text-red-600"
          >Debes asignar la tarea a un usuario.</span
        >
      }
    </div>

    <fieldset
      formGroupName="additionalInfo"
      class="rounded-md border border-slate-200 p-3"
    >
      <legend class="px-1 text-xs font-medium text-slate-600">
        Información adicional (JSON)
      </legend>

      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        <div class="flex flex-col gap-1">
          <label
            class="text-xs font-medium text-slate-600"
            for="priority"
            >Prioridad</label
          >
          <select
            id="priority"
            formControlName="priority"
            class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm"
          >
            <option value="">—</option>
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <label
            class="text-xs font-medium text-slate-600"
            for="estimatedEndDate"
          >
            Fecha estimada
          </label>
          <input
            id="estimatedEndDate"
            type="date"
            formControlName="estimatedEndDate"
            class="rounded-md border border-slate-300 px-3 py-2 text-sm"
          />
        </div>

        <div class="flex flex-col gap-1 sm:col-span-2">
          <label class="text-xs font-medium text-slate-600" for="tags">
            Etiquetas (separadas por coma)
          </label>
          <input
            id="tags"
            type="text"
            formControlName="tags"
            placeholder="backend, urgent"
            class="rounded-md border border-slate-300 px-3 py-2 text-sm"
          />
        </div>
      </div>
    </fieldset>

    <div class="flex items-center justify-end gap-2 pt-1">
      <a
        routerLink="/tasks"
        class="rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
      >
        Cancelar
      </a>
      <button
        type="submit"
        [disabled]="submitting"
        class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 disabled:opacity-50"
      >
        {{ submitting ? 'Guardando…' : 'Crear tarea' }}
      </button>
    </div>
  </form>
</section>
