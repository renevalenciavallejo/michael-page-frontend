<section class="flex flex-col gap-4">
  <header class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-xl font-semibold">Tareas</h1>
      <p class="text-sm text-slate-500">
        {{ tasks().length }} resultado(s)
        @if (resource.isLoading()) {
          · cargando…
        }
      </p>
    </div>
    <div class="flex items-center gap-2">
      <label for="filter" class="text-sm text-slate-600">Estado:</label>
      <select
        id="filter"
        class="rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900"
        [ngModel]="filter()"
        (ngModelChange)="filter.set($event)"
      >
        <option [ngValue]="'all'">Todos</option>
        @for (s of statuses; track s) {
          <option [ngValue]="s">{{ labels[s] }}</option>
        }
      </select>
      <a
        routerLink="/tasks/new"
        class="rounded-md bg-slate-900 px-3 py-1.5 text-sm font-medium text-white hover:bg-slate-800"
        >+ Nueva</a
      >
    </div>
  </header>

  @if (!resource.isLoading() && tasks().length === 0) {
    <div
      class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center text-sm text-slate-500"
    >
      No hay tareas que coincidan con el filtro.
    </div>
  }

  <div class="grid grid-cols-1 gap-3 md:grid-cols-2 lg:grid-cols-3">
    @for (t of tasks(); track t.id) {
      <app-task-item [task]="t" (statusChanged)="resource.reload()" />
    }
  </div>
</section>
